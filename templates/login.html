{% extends "base.html" %}
{% block content %}
<section class="card login-card">
  <h1>Sign in</h1>
  
  <form method="post">
    <label>Username
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>Password
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
